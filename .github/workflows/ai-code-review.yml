name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize, labeled, unlabeled]

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  ai-review:
    runs-on: [self-hosted, linux, x64, hermes]
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine review tier
        id: tier
        env:
          PR_LABELS: ${{ toJSON(github.event.pull_request.labels.*.name) }}
        run: |
          # Label overrides: review:deep, review:medium
          if echo "$PR_LABELS" | grep -q "review:deep"; then
            echo "model=gpt-5.4" >> "$GITHUB_OUTPUT"
            echo "tier=DEEP" >> "$GITHUB_OUTPUT"
          elif echo "$PR_LABELS" | grep -q "review:medium"; then
            echo "model=Kimi-K2.6" >> "$GITHUB_OUTPUT"
            echo "tier=MEDIUM" >> "$GITHUB_OUTPUT"
          else
            # Default: Quick check with DeepSeek-V4-Pro
            echo "model=DeepSeek-V4-Pro" >> "$GITHUB_OUTPUT"
            echo "tier=QUICK" >> "$GITHUB_OUTPUT"
          fi

      - name: Run AI Code Review (${{ steps.tier.outputs.tier }})
        id: review
        env:
          AZURE_FOUNDRY_KEY: ${{ secrets.AZURE_FOUNDRY_KEY }}
          AZURE_DEPLOYMENT: ${{ steps.tier.outputs.model }}
          REVIEW_TIER: ${{ steps.tier.outputs.tier }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BASE_REF: ${{ github.base_ref }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          python3 .github/scripts/code-review.py

      - name: Post Review to PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EVENT=$(cat /tmp/review_event.txt)
          BODY=$(cat /tmp/review_body.md)
          gh pr review ${{ github.event.pull_request.number }} \
            $EVENT \
            --body "$BODY"
